# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
  branches:
    include:
      - "*"

variables:
- group: TokensForSyncing

steps:
- script: |
    git clone https://$(GithubUserName):$(GithubToken)@$(GithubPath) source
    cd source

    echo "Adding Azure DevOps remote"
    git remote add azure https://$(AzureUserName):$(AzureToken)@$(AzurePath)

    echo "Fetching all refs from GitHub"
    git fetch --all --prune

    git remote add azure https://$(AzureUserName):$(AzureToken)@$(AzurePath)
    git push azure --mirror